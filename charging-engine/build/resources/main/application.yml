spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5433/telcoedge
    username: telcoedge
    password: telcoedge_dev
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        generate_statistics: true
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
          default_batch_fetch_size: 25
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 25
    open_in_view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081

logging:
  level:
    root: INFO
    com.telcoedge: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.stat: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE




