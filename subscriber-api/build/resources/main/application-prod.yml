# Prod Profile - environment variables for secrets, minimal logging
spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    show-sql: false

  flyway:
    enabled: true


logging:
  level:
    root: WARN
    com.telcoedge: INFO
    org.hibernate.sql: WARN

