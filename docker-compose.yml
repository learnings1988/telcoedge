services:
  postgres:
    image: postgres:16-alpine
    container_name: telcoedge-postgres
    environment:
      POSTGRES_DB: telcoedge
      POSTGRES_USER: telcoedge
      POSTGRES_PASSWORD: telcoedge_dev
    ports:
      # Host 5433 avoids conflict with local PostgreSQL 17 on Windows (often uses 5432).
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telcoedge"]
      interval: 5s
      timeout: 3s
      retries: 5

  subscriber-api:
    build:
      context: .
      dockerfile: subscriber-api/Dockerfile
    container_name: telcoedge-subscriber-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/telcoedge
      SPRING_DATASOURCE_USERNAME: telcoedge
      SPRING_DATASOURCE_PASSWORD: telcoedge_dev
    ports:
      - "8080:8080"


volumes:
  postgres_data: