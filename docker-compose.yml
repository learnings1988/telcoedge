services:
  postgres:
    image: postgres:16-alpine
    container_name: telcoedge-postgres
    environment:
      POSTGRES_DB: telcoedge
      POSTGRES_USER: telcoedge
      POSTGRES_PASSWORD: telcoedge_dev
    ports:
      # Host 5433 avoids conflict with a local PostgreSQL install on 5432 (common on Windows).
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telcoedge"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data: